<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="form.css">
</head>
<body>
    <div class="box">
        <form class="form">
            <h1><b>Welcome..💫</b></h1>
            <input id="username" type="text" required placeholder="Username :">
            <input id="mail" type="email" required placeholder="Mail ID :">
            <input id="pass" type="password" required placeholder="Create Password : ">
            <input id="cpass" type="password" required placeholder="Confirm Password : ">
            <button id="btn" type="submit">Submit</button>

        </form>
    </div>
    <script src="form.js"></script>
</body>
</html>
